name: Release

on:
  push:
    tags:
      - '*-*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name to release (e.g. 1.21.9-1.6.5-beta)'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Determine tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.name }}

      - name: Read project properties
        id: props
        run: |
          TAG_NAME="${{ steps.tag.outputs.name }}"
          MC_VERSION="$(grep '^mc_ver=' gradle.properties | cut -d= -f2 | tr -d '\r')"
          MOD_VERSION="${TAG_NAME#${MC_VERSION}-}"

          PROPS_FILE="versionProperties/${MC_VERSION}.properties"
          JAVA_VERSION="21"
          BUILDS_FOR="fabric,forge,neoforge"
          if [ -f "$PROPS_FILE" ]; then
            JV="$(grep '^java_version=' "$PROPS_FILE" | cut -d= -f2 | tr -d '\r')"
            if [ -n "$JV" ]; then JAVA_VERSION="$JV"; fi
            BF="$(grep '^builds_for=' "$PROPS_FILE" | cut -d= -f2 | tr -d '\r')"
            if [ -n "$BF" ]; then BUILDS_FOR="$BF"; fi
          fi

          # Build loaders multiline for mc-publish
          LOADERS_MULTILINE="$(echo "$BUILDS_FOR" | tr ',' '\n')"

          echo "TAG_NAME=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "MC_VERSION=$MC_VERSION" >> "$GITHUB_OUTPUT"
          echo "MOD_VERSION=$MOD_VERSION" >> "$GITHUB_OUTPUT"
          echo "JAVA_VERSION=$JAVA_VERSION" >> "$GITHUB_OUTPUT"
          echo "BUILDS_FOR=$BUILDS_FOR" >> "$GITHUB_OUTPUT"
          echo "HAS_NEOFORGE=$( [[ "$BUILDS_FOR" == *neoforge* ]] && echo true || echo false )" >> "$GITHUB_OUTPUT"
          {
            echo "LOADERS<<EOF"
            echo "$LOADERS_MULTILINE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up JDK ${{ steps.props.outputs.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: '${{ steps.props.outputs.JAVA_VERSION }}'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build with Gradle
        run: ./gradlew build --no-daemon -x test -x compileTestJava

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.props.outputs.TAG_NAME }}
          name: OneKeyMiner ${{ steps.props.outputs.TAG_NAME }}
          body: |
            ## OneKeyMiner ${{ steps.props.outputs.TAG_NAME }}
            
            - Minecraft: ${{ steps.props.outputs.MC_VERSION }}
            - Mod Version: ${{ steps.props.outputs.MOD_VERSION }}
            
            ### 下载 / Downloads
            
            | 平台 / Platform | 文件 / File |
            |-----------------|-------------|
            | Fabric | `onekeyminer-fabric-*.jar` |
            | Forge | `onekeyminer-forge-*.jar` |
            ${{ steps.props.outputs.HAS_NEOFORGE == 'true' && '| NeoForge | `onekeyminer-neoforge-*.jar` |' || '' }}
            | 通用 / Universal | `onekeyminer-*.jar` (Forgix merged) |
            
            ### 环境要求 / Requirements
            - Minecraft ${{ steps.props.outputs.MC_VERSION }}
            - Java ${{ steps.props.outputs.JAVA_VERSION }}+
            
            ### 更新日志 / Changelog
            请查看 [commits](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) 了解详情。
          files: |
            fabric/build/libs/!(*-sources).jar
            forge/build/libs/!(*-sources).jar
            neoforge/build/libs/!(*-sources).jar
            build/forgix/!(*-sources).jar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Publish Forgix Merged JAR to Modrinth & CurseForge
      - name: Publish Universal (Forgix) to Modrinth & CurseForge
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: LZu4H9cp
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          
          curseforge-id: 1078620
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          
          files: build/forgix/!(*-sources).jar
          name: OneKeyMiner ${{ steps.props.outputs.TAG_NAME }} (Universal)
          version: ${{ steps.props.outputs.MOD_VERSION }}-universal
          version-type: release
          changelog: |
            ## OneKeyMiner ${{ steps.props.outputs.TAG_NAME }} (Universal)
            
            This is the Forgix merged version.
            
            Please Go to [GitHub Release](https://github.com/${{ github.repository }}/releases/tag/${{ steps.props.outputs.TAG_NAME }}) for details.
          loaders: ${{ steps.props.outputs.LOADERS }}
          game-versions: ${{ steps.props.outputs.MC_VERSION }}
          java: ${{ steps.props.outputs.JAVA_VERSION }}
